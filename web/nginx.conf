server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Laravel API — same-origin so Sanctum's SPA cookie session + CSRF cookie
  # need no CORS/cross-site handling.
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location /sanctum/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  # Reverb (realtime) — the browser connects directly per VITE_REVERB_* env
  # vars; this app/service is exposed on its own port, not proxied here.

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
